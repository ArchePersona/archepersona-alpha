<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchePersona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #061d27;
      --cream: #f0ede8;
      --gold: #b8940a;
      --line: rgba(240, 237, 232, 0.14);
      --dim: rgba(240, 237, 232, 0.42);
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--black), #031117 72%);
      color: var(--cream);
      font-family: "JetBrains Mono", monospace;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 29, 39, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: 60px;
      align-items: center;
      justify-content: center;
    }

    .maintenance-message {
      text-align: center;
      padding: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(6, 29, 39, 0.95);
      max-width: 500px;
    }

    .maintenance-message h2 {
      margin: 0 0 20px 0;
      font-size: 24px;
      color: var(--gold);
      letter-spacing: -1px;
    }

    .maintenance-message p {
      margin: 0 0 16px 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--dim);
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #ff6b35;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(6, 29, 39, 0.95);
      z-index: 100;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--cream);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      opacity: 0.5;
      cursor: not-allowed;
    }

    button {
      padding: 8px 12px;
      background: rgba(184, 148, 10, 0.2);
      border: 1px solid var(--gold);
      border-radius: 6px;
      color: var(--gold);
      cursor: not-allowed;
      font-family: inherit;
      font-size: 12px;
      white-space: nowrap;
      min-width: 50px;
      opacity: 0.5;
    }

    /* MODAL */
    .modal {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--black);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      max-width: 500px;
      text-align: center;
    }

    .modal-content h2 {
      margin: 0 0 20px 0;
      font-size: 24px;
      color: var(--gold);
    }

    .modal-content p {
      margin: 0 0 16px 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--dim);
    }

    .modal-button {
      background: rgba(184, 148, 10, 0.2);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      margin-top: 20px;
    }

    .modal-button:active {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ArchePersona</h1>
    </div>

    <div class="chat-container">
      <div class="maintenance-message">
        <h2>BRUNEL</h2>
        <p><span class="status-indicator"></span> Maintenance in Progress</p>
        <p>We're currently offline implementing critical security improvements.</p>
        <p style="color: var(--cream); margin-top: 20px;">We'll be back soon.</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="BRUNEL is offline..." disabled></textarea>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <!-- MAINTENANCE MODAL -->
  <div class="modal" id="maintenanceModal">
    <div class="modal-content">
      <h2>BRUNEL Offline</h2>
      <p>Security updates in progress. We're working to bring BRUNEL back with improved safety and performance.</p>
      <p style="font-size: 12px; color: var(--dim); margin-top: 20px;">Check back soon.</p>
      <button class="modal-button" onclick="closeModal()">Got it</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById('maintenanceModal');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Show modal on load
    window.addEventListener('load', () => {
      modal.style.display = 'flex';
    });

    function closeModal() {
      modal.style.display = 'none';
    }

    // Disable all interactions
    sendBtn.addEventListener('click', (e) => {
      e.preventDefault();
      closeModal();
      modal.style.display = 'flex';
    });

    userInput.addEventListener('keydown', (e) => {
      e.preventDefault();
    });

    // Prevent any API calls
    fetch = function() {
      return Promise.reject(new Error('BRUNEL is offline for maintenance'));
    };
  </script>
</body>
</html>
